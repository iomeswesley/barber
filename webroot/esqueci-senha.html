<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esqueci minha senha</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23e8c76a'/><stop offset='55%25' stop-color='%23d4af37'/><stop offset='100%25' stop-color='%238a6a2f'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='70' font-size='56' text-anchor='middle'>%F0%9F%92%88</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..800;1,300..800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<style>
  body { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 0; }
  .card { width: 100%; max-width: 360px; padding: 32px 28px; }
  .logo { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 14px; background: linear-gradient(145deg, #e8c76a, var(--gold) 55%, #8a6a2f); }
  h1 { font-size: 18px; text-align: center; margin: 0 0 4px; }
  p.hint { text-align: center; color: var(--text-muted); font-size: 12.5px; margin: 0 0 22px; line-height: 1.6; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.03); color: var(--text-primary); font-size: 14px; margin-bottom: 16px; transition: border-color .2s ease; }
  input:focus { outline: none; border-color: var(--gold); }
  button { width: 100%; padding: 11px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f0d585, var(--gold) 45%, #9c7a1e); color: #17130a; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform .15s ease, filter .2s ease; }
  button:hover { transform: translateY(-1px); filter: brightness(1.08); }
  button:disabled { opacity: .6; cursor: default; transform: none; }
  .error { background: var(--danger-soft); color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 14px; display: none; }
  .success-state { text-align: center; padding: 10px 0; font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; color: var(--text-primary); line-height: 1.6; }
  .success-state .icon { font-size: 34px; margin-bottom: 10px; }
  .back-link { display: block; text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 12px; text-decoration: none; }
  .back-link:hover { color: var(--gold); }
</style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <div class="card">
    <div class="logo">🔑</div>
    <h1>Esqueci minha senha</h1>
    <p class="hint">Informe o e-mail da sua conta e mandamos um link pra redefinir a senha.</p>

    <div id="form-view">
      <div class="error" id="error-box"></div>
      <label>E-mail</label>
      <input id="email" type="email" autocomplete="email" placeholder="voce@exemplo.com" />
      <button id="submit-btn">Enviar link</button>
    </div>

    <div id="success-view" style="display:none;" class="success-state">
      <div class="icon">✅</div>
      <div>Se esse e-mail estiver cadastrado, um link de redefinição foi enviado.</div>
    </div>

    <a class="back-link" href="/login.html">← Voltar pro login</a>
  </div>

<script>
function showError(msg) {
  const box = document.getElementById("error-box");
  box.textContent = msg;
  box.style.display = "block";
}

document.getElementById("submit-btn").addEventListener("click", async () => {
  document.getElementById("error-box").style.display = "none";
  const email = document.getElementById("email").value.trim();
  if (!email) { showError("Informe seu e-mail."); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {
    const res = await fetch("/api/auth/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || "Não foi possível processar sua solicitação.");
      btn.disabled = false;
      btn.textContent = "Enviar link";
      return;
    }
    document.getElementById("form-view").style.display = "none";
    document.getElementById("success-view").style.display = "block";
  } catch (err) {
    showError("Erro de conexão com o servidor.");
    btn.disabled = false;
    btn.textContent = "Enviar link";
  }
});
</script>
</body>
</html>
