<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meus agendamentos</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23e8c76a'/><stop offset='55%25' stop-color='%23d4af37'/><stop offset='100%25' stop-color='%238a6a2f'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='70' font-size='56' text-anchor='middle'>%F0%9F%92%88</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..800;1,300..800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<script src="/assets/modal.js" defer></script>
<style>
  body { padding: 24px 16px; position: relative; z-index: 0; }

  .wrap { max-width: 480px; margin: 0 auto; }
  .logo-row { text-align: center; margin-bottom: 18px; }
  .logo { width: 46px; height: 46px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; background: linear-gradient(145deg, #e8c76a, var(--gold) 55%, #8a6a2f); }
  h1 { font-size: 18px; text-align: center; margin: 12px 0 4px; }
  p.hint { text-align: center; color: var(--text-muted); font-size: 12.5px; margin: 0 0 22px; }

  .card { padding: 24px 22px; margin-bottom: 16px; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--card-border); background: rgba(255,255,255,0.03);
    color: var(--text-primary); font-size: 13px; margin-bottom: 14px;
    transition: border-color .2s ease;
  }
  select { background-color: var(--card-bg-solid); color-scheme: dark; }
  input:focus, select:focus { outline: none; border-color: var(--gold); }
  button.primary {
    width: 100%; padding: 11px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, #f0d585, var(--gold) 45%, #9c7a1e);
    color: #17130a; font-weight: 700; font-size: 13px; cursor: pointer;
    transition: transform .2s ease, filter .2s ease;
  }
  button.primary:hover { transform: translateY(-1px); filter: brightness(1.08); }
  button.secondary {
    padding: 8px 14px; border-radius: 10px; border: 1px solid var(--card-border);
    background: transparent; color: var(--text-primary); font-size: 12px; cursor: pointer;
    transition: border-color .2s ease, color .2s ease;
  }
  button.secondary:hover { border-color: var(--card-border-hover); color: var(--gold); }
  button.danger-btn { border-color: var(--danger); color: var(--danger); }
  button.danger-btn:hover { border-color: var(--danger); color: var(--danger); filter: brightness(1.15); }

  .error { background: var(--danger-soft); color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 14px; display: none; }
  .empty-state { text-align: center; padding: 24px 10px; color: var(--text-muted); font-size: 12.5px; }

  .appt-card { border: 1px solid var(--card-border); border-radius: 14px; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.02); }
  .appt-client { font-weight: 700; font-size: 13.5px; }
  .appt-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .appt-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .slot-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .slot-btn {
    padding: 7px 12px; border-radius: 8px; border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.03); color: var(--text-primary); font-size: 12px; cursor: pointer;
  }
  .slot-btn.selected { background: var(--gold); color: #17130a; border-color: var(--gold); font-weight: 700; }
  .reschedule-panel { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--divider); display: none; }
  .history-card { border: 1px solid var(--card-border); border-radius: 14px; padding: 14px; margin-bottom: 12px; background: rgba(255,255,255,0.02); opacity: 0.85; }
  .section-label { font-size: 12px; color: var(--text-muted); font-weight: 700; letter-spacing: .5px; margin: 18px 0 10px; }
  .link-back { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 12px; text-decoration: none; }
  .link-back:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="bg-blobs" aria-hidden="true">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
</div>

<div class="wrap">
  <div class="logo-row"><div class="logo">💈</div></div>
  <h1>Meus agendamentos</h1>
  <p class="hint">Cancele ou remarque seu horário sem precisar conversar com a gente</p>

  <div class="card" id="lookup-card">
    <div class="error" id="error-box"></div>
    <label>Barbearia</label>
    <select id="shop-select"><option value="">Carregando...</option></select>
    <label>Seu telefone (com DDD)</label>
    <input type="text" id="phone-input" placeholder="Ex: 11999998888" />
    <button class="primary" id="lookup-btn">Ver meus agendamentos</button>
  </div>

  <div id="results"></div>

  <a class="link-back" href="/chat.html">← Prefiro conversar com a IA</a>
  <a class="link-back" href="/excluir-dados.html" style="margin-top:8px; font-size:11px;">Quero excluir meus dados</a>
</div>

<script>
function currency(v) { return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL", maximumFractionDigits: 0 }).format(v || 0); }

let currentPhone = "";
let currentShopId = "";

async function loadShops() {
  const shops = await (await fetch("/api/barbershops")).json();
  const select = document.getElementById("shop-select");
  select.innerHTML = shops.map((s) => `<option value="${s.id}">${s.name}</option>`).join("");
}

function showError(msg) {
  const box = document.getElementById("error-box");
  box.textContent = msg;
  box.style.display = "block";
}
function hideError() {
  document.getElementById("error-box").style.display = "none";
}

function apptCardHtml(a) {
  return `
    <div class="appt-card" data-appt-id="${a.id}">
      <div class="appt-client">${a.service_name} com ${a.barber_name}</div>
      <div class="appt-meta">${a.date} · ${a.start_time} – ${a.end_time} · ${currency(a.price_cents / 100)}</div>
      <div class="appt-actions">
        <button class="secondary" data-open-reschedule="${a.id}">Remarcar</button>
        <button class="secondary danger-btn" data-cancel="${a.id}">Cancelar</button>
      </div>
      <div class="reschedule-panel" id="reschedule-${a.id}">
        <label>Nova data</label>
        <input type="date" id="reschedule-date-${a.id}" />
        <button class="secondary" data-load-slots="${a.id}" data-barber="${a.barber_id}" data-service="${a.service_id}">Ver horários</button>
        <div class="slot-list" id="slot-list-${a.id}"></div>
        <button class="primary" style="margin-top:10px; display:none;" id="confirm-reschedule-${a.id}" data-confirm-reschedule="${a.id}">Confirmar novo horário</button>
      </div>
    </div>
  `;
}

function wireApptCard(id) {
  document.querySelector(`[data-open-reschedule="${id}"]`).addEventListener("click", () => {
    const panel = document.getElementById(`reschedule-${id}`);
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  });
  document.querySelector(`[data-cancel="${id}"]`).addEventListener("click", async () => {
    if (!(await showConfirmModal("Cancelar este agendamento?"))) return;
    const res = await fetch(`/api/public/appointments/${id}/cancel`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: currentPhone }),
    });
    if (!res.ok) {
      const err = await res.json();
      showError(err.error || "Erro ao cancelar");
      return;
    }
    lookupAppointments();
  });
  document.querySelector(`[data-load-slots="${id}"]`).addEventListener("click", async () => {
    const btn = document.querySelector(`[data-load-slots="${id}"]`);
    const date = document.getElementById(`reschedule-date-${id}`).value;
    if (!date) { showError("Escolha uma data."); return; }
    hideError();
    const params = new URLSearchParams({
      barbershopId: currentShopId,
      barberId: btn.dataset.barber,
      serviceId: btn.dataset.service,
      date,
    });
    const slots = await (await fetch(`/api/public/available-slots?${params}`)).json();
    const slotList = document.getElementById(`slot-list-${id}`);
    if (slots.length === 0) {
      slotList.innerHTML = `<div class="empty-state">Sem horários livres nesse dia.</div>`;
      return;
    }
    slotList.innerHTML = slots
      .map((s) => `<button type="button" class="slot-btn" data-slot="${s}">${s}</button>`)
      .join("");
    slotList.querySelectorAll("[data-slot]").forEach((sb) => {
      sb.addEventListener("click", () => {
        slotList.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("selected"));
        sb.classList.add("selected");
        document.getElementById(`confirm-reschedule-${id}`).style.display = "block";
      });
    });
  });
  document.getElementById(`confirm-reschedule-${id}`).addEventListener("click", async () => {
    const selected = document.querySelector(`#slot-list-${id} .slot-btn.selected`);
    const date = document.getElementById(`reschedule-date-${id}`).value;
    if (!selected || !date) return;
    const res = await fetch(`/api/public/appointments/${id}/reschedule`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone: currentPhone, newDate: date, newStartTime: selected.dataset.slot }),
    });
    if (!res.ok) {
      const err = await res.json();
      showError(err.error || "Erro ao remarcar");
      return;
    }
    lookupAppointments();
  });
}

function historyCardHtml(a, isMostRecent) {
  return `
    <div class="history-card" data-history-id="${a.id}">
      <div class="appt-client">${a.service_name} com ${a.barber_name}</div>
      <div class="appt-meta">${a.date} · ${a.start_time} – ${a.end_time} · ${currency(a.price_cents / 100)}</div>
      ${isMostRecent ? `<div class="appt-actions"><button class="secondary" data-repeat-open="${a.id}" data-barber="${a.barber_id}" data-service="${a.service_id}">Reagendar igual ao último</button></div>` : ""}
      <div class="reschedule-panel" id="repeat-${a.id}">
        <label>Data desejada</label>
        <input type="date" id="repeat-date-${a.id}" />
        <button class="secondary" data-repeat-load-slots="${a.id}">Ver horários</button>
        <div class="slot-list" id="repeat-slot-list-${a.id}"></div>
        <button class="primary" style="margin-top:10px; display:none;" id="repeat-confirm-${a.id}" data-repeat-confirm="${a.id}">Confirmar agendamento</button>
      </div>
    </div>
  `;
}

function wireHistoryCard(a) {
  const openBtn = document.querySelector(`[data-repeat-open="${a.id}"]`);
  if (!openBtn) return;
  openBtn.addEventListener("click", () => {
    const panel = document.getElementById(`repeat-${a.id}`);
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  });
  document.querySelector(`[data-repeat-load-slots="${a.id}"]`).addEventListener("click", async () => {
    const date = document.getElementById(`repeat-date-${a.id}`).value;
    if (!date) { showError("Escolha uma data."); return; }
    hideError();
    const params = new URLSearchParams({
      barbershopId: currentShopId,
      barberId: openBtn.dataset.barber,
      serviceId: openBtn.dataset.service,
      date,
    });
    const slots = await (await fetch(`/api/public/available-slots?${params}`)).json();
    const slotList = document.getElementById(`repeat-slot-list-${a.id}`);
    if (slots.length === 0) {
      slotList.innerHTML = `<div class="empty-state">Sem horários livres nesse dia.</div>`;
      return;
    }
    slotList.innerHTML = slots
      .map((s) => `<button type="button" class="slot-btn" data-slot="${s}">${s}</button>`)
      .join("");
    slotList.querySelectorAll("[data-slot]").forEach((sb) => {
      sb.addEventListener("click", () => {
        slotList.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("selected"));
        sb.classList.add("selected");
        document.getElementById(`repeat-confirm-${a.id}`).style.display = "block";
      });
    });
  });
  document.getElementById(`repeat-confirm-${a.id}`).addEventListener("click", async () => {
    const selected = document.querySelector(`#repeat-slot-list-${a.id} .slot-btn.selected`);
    const date = document.getElementById(`repeat-date-${a.id}`).value;
    if (!selected || !date) return;
    const res = await fetch(`/api/public/appointments`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        barbershopId: currentShopId,
        phone: currentPhone,
        barberId: openBtn.dataset.barber,
        serviceId: openBtn.dataset.service,
        date,
        startTime: selected.dataset.slot,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      showError(err.error || "Erro ao agendar");
      return;
    }
    lookupAppointments();
  });
}

async function lookupAppointments() {
  hideError();
  currentShopId = document.getElementById("shop-select").value;
  currentPhone = document.getElementById("phone-input").value.replace(/\D/g, "");
  if (!currentShopId || !currentPhone) {
    showError("Escolha a barbearia e informe seu telefone.");
    return;
  }
  const params = new URLSearchParams({ barbershopId: currentShopId, phone: currentPhone });
  const [apptsRes, historyRes] = await Promise.all([
    fetch(`/api/public/appointments?${params}`),
    fetch(`/api/public/appointment-history?${params}`),
  ]);
  if (!apptsRes.ok) {
    const err = await apptsRes.json();
    showError(err.error || "Erro ao buscar agendamentos");
    return;
  }
  const appts = await apptsRes.json();
  const history = historyRes.ok ? await historyRes.json() : [];
  const results = document.getElementById("results");

  let html = "";
  if (appts.length === 0) {
    html += `<div class="card"><div class="empty-state">Nenhum agendamento futuro encontrado para esse telefone.</div></div>`;
  } else {
    html += `<div class="card">${appts.map((a) => apptCardHtml(a)).join("")}</div>`;
  }

  if (history.length > 0) {
    html += `<div class="section-label">Histórico de atendimentos</div>`;
    html += `<div class="card">${history.map((a, i) => historyCardHtml(a, i === 0)).join("")}</div>`;
  }

  results.innerHTML = html;
  appts.forEach((a) => wireApptCard(a.id));
  history.forEach((a) => wireHistoryCard(a));
}

document.getElementById("lookup-btn").addEventListener("click", lookupAppointments);

loadShops();
</script>
</body>
</html>
