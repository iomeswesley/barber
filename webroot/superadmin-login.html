<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Administração</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23e8c76a'/><stop offset='55%25' stop-color='%23d4af37'/><stop offset='100%25' stop-color='%238a6a2f'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='70' font-size='56' text-anchor='middle'>%F0%9F%9B%A1</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..800;1,300..800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<style>
  body { display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 0; }
  .card { width: 100%; max-width: 360px; padding: 32px 28px; }
  .logo { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin: 0 auto 14px; background: linear-gradient(145deg, #e8c76a, var(--gold) 55%, #8a6a2f); }
  h1 { font-size: 18px; text-align: center; margin: 0 0 4px; }
  p.hint { text-align: center; color: var(--text-muted); font-size: 12.5px; margin: 0 0 22px; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
  input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.03); color: var(--text-primary); font-size: 14px; margin-bottom: 16px; transition: border-color .2s ease; }
  input:focus { outline: none; border-color: var(--gold); }
  button { width: 100%; padding: 11px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f0d585, var(--gold) 45%, #9c7a1e); color: #17130a; font-weight: 700; font-size: 14px; cursor: pointer; transition: transform .15s ease, filter .2s ease; }
  button:hover { transform: translateY(-1px); filter: brightness(1.08); }
  button:disabled { opacity: .6; cursor: default; transform: none; }
  .error { background: var(--danger-soft); color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 12.5px; margin-bottom: 14px; display: none; }
</style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <div class="card">
    <div class="logo">🛡️</div>
    <h1>Administração</h1>
    <p class="hint">Acesso restrito da plataforma</p>
    <div class="error" id="error-box"></div>
    <form id="login-form">
      <label>Usuário</label>
      <input id="username" type="text" autocomplete="username" />
      <label>Senha</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button type="submit" id="submit-btn">Entrar</button>
    </form>
  </div>

<script>
const form = document.getElementById("login-form");
const errorBox = document.getElementById("error-box");
const submitBtn = document.getElementById("submit-btn");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.style.display = "none";
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  submitBtn.disabled = true;
  submitBtn.textContent = "Entrando...";
  try {
    const res = await fetch("/api/superadmin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errorBox.textContent = data.error || "Não foi possível entrar.";
      errorBox.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Entrar";
      return;
    }
    window.location.href = data.redirect;
  } catch (err) {
    errorBox.textContent = "Erro de conexão com o servidor.";
    errorBox.style.display = "block";
    submitBtn.disabled = false;
    submitBtn.textContent = "Entrar";
  }
});
</script>
</body>
</html>
