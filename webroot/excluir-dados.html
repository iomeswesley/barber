<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Excluir meus dados</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23e8c76a'/><stop offset='55%25' stop-color='%23d4af37'/><stop offset='100%25' stop-color='%238a6a2f'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='70' font-size='56' text-anchor='middle'>%F0%9F%92%88</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300..800;1,300..800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/theme.css">
<script src="/assets/modal.js" defer></script>
<style>
  body { padding: 24px 16px; position: relative; z-index: 0; }
  .wrap { max-width: 440px; margin: 0 auto; }
  .card { padding: 28px 26px; }
  .logo-row { text-align: center; margin-bottom: 14px; }
  .logo { width: 46px; height: 46px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; background: linear-gradient(145deg, #e8c76a, var(--gold) 55%, #8a6a2f); }
  h1 { font-size: 17px; text-align: center; margin: 12px 0 4px; }
  p.hint { text-align: center; color: var(--text-muted); font-size: 12.5px; margin: 0 0 22px; line-height: 1.6; }
  label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--card-border); background: rgba(255,255,255,0.03);
    color: var(--text-primary); font-size: 13px; margin-bottom: 14px;
  }
  select { background-color: var(--card-bg-solid); color-scheme: dark; }
  input:focus, select:focus { outline: none; border-color: var(--gold); }
  button {
    width: 100%; padding: 11px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--danger), #c23030);
    color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { opacity: .6; cursor: default; }
  .error {
    background: var(--danger-soft); color: var(--danger);
    padding: 8px 12px; border-radius: 8px; font-size: 12.5px;
    margin-bottom: 14px; display: none;
  }
  .success-state { text-align: center; padding: 10px 0; }
  .success-state .icon { font-size: 34px; margin-bottom: 10px; }
  .link-back { display: block; text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 12px; text-decoration: none; }
  .link-back:hover { color: var(--gold); }
</style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>
  <div class="wrap">
    <div class="card">
      <div class="logo-row"><div class="logo">🗑️</div></div>
      <h1>Excluir meus dados</h1>
      <p class="hint">Isso remove seu nome, telefone e data de nascimento do cadastro dessa barbearia, conforme a LGPD. Seu histórico de agendamentos passados fica anonimizado, mas não pode ser desfeito.</p>

      <div id="form-view">
        <div class="error" id="error-box"></div>
        <label>Barbearia</label>
        <select id="shop-select"><option value="">Carregando...</option></select>
        <label>Seu telefone (com DDD)</label>
        <input type="text" id="phone-input" placeholder="Ex: 11999998888" />
        <button id="submit-btn">Excluir meus dados</button>
      </div>

      <div id="success-view" style="display:none;" class="success-state">
        <div class="icon">✅</div>
        <div>Pronto — seus dados foram removidos dessa barbearia.</div>
      </div>
    </div>
    <a class="link-back" href="/privacidade.html">← Voltar pra política de privacidade</a>
  </div>

<script>
async function loadShops() {
  const shops = await (await fetch("/api/barbershops")).json();
  const select = document.getElementById("shop-select");
  select.innerHTML = shops.map((s) => `<option value="${s.id}">${s.name}</option>`).join("");
}
loadShops();

function showError(msg) {
  const box = document.getElementById("error-box");
  box.textContent = msg;
  box.style.display = "block";
}

document.getElementById("submit-btn").addEventListener("click", async () => {
  document.getElementById("error-box").style.display = "none";
  const barbershopId = document.getElementById("shop-select").value;
  const phone = document.getElementById("phone-input").value;
  if (!barbershopId || !phone.trim()) {
    showError("Escolha a barbearia e informe seu telefone.");
    return;
  }

  const confirmed = await showConfirmModal(
    "Tem certeza? Essa ação não pode ser desfeita — seus dados pessoais serão removidos permanentemente."
  );
  if (!confirmed) return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Excluindo...";

  try {
    const res = await fetch("/api/public/clients/data-deletion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ barbershopId, phone }),
    });
    const data = await res.json();
    if (!res.ok) {
      showError(data.error || "Não foi possível processar sua solicitação.");
      btn.disabled = false;
      btn.textContent = "Excluir meus dados";
      return;
    }
    document.getElementById("form-view").style.display = "none";
    document.getElementById("success-view").style.display = "block";
  } catch (err) {
    showError("Erro de conexão com o servidor.");
    btn.disabled = false;
    btn.textContent = "Excluir meus dados";
  }
});
</script>
</body>
</html>
