<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar — Painel Barbearia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c11;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --text: #f3f4f7;
    --muted: #9aa1ac;
    --gold: #d4af6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Open Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
    text-transform: uppercase;
    background:
      radial-gradient(1000px 500px at 85% 0%, rgba(212,175,106,0.08), transparent 60%),
      radial-gradient(800px 500px at 10% 100%, rgba(91,157,255,0.06), transparent 55%),
      var(--bg);
    color: var(--text);
    padding: 20px;
  }
  button, input, select, textarea, option {
    text-transform: uppercase;
    font-family: inherit;
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    backdrop-filter: blur(16px);
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }
  .logo {
    width: 46px; height: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin: 0 auto 14px;
    background: linear-gradient(145deg, var(--gold), #8a6a2f);
  }
  h1 { font-size: 17px; text-align: center; margin: 0 0 4px; }
  p.hint { text-align: center; color: var(--muted); font-size: 12.5px; margin: 0 0 22px; }
  label { font-size: 12px; color: var(--muted); font-weight: 600; display: block; margin-bottom: 5px; }
  input {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.03);
    color: var(--text); font-size: 14px; margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: var(--gold); }
  button {
    width: 100%; padding: 11px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), #a9822f);
    color: #17130a; font-weight: 700; font-size: 14px; cursor: pointer;
    transition: transform .15s ease;
  }
  button:hover { transform: translateY(-1px); }
  .error {
    background: rgba(240,71,71,0.12); color: #f04747;
    padding: 8px 12px; border-radius: 8px; font-size: 12.5px;
    margin-bottom: 14px; display: none;
  }
  .demo-box {
    margin-top: 20px; padding: 12px; border-radius: 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    font-size: 11.5px; color: var(--muted); line-height: 1.6;
  }
  .demo-box b { color: var(--text); }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">💈</div>
    <h1>Painel da Barbearia</h1>
    <p class="hint">Entre com seu usuário e senha</p>
    <div class="error" id="error-box"></div>
    <form id="login-form">
      <label>Usuário</label>
      <input id="username" type="text" autocomplete="username" />
      <label>Senha</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button type="submit">Entrar</button>
    </form>
    <div class="demo-box">
      <b>Usuários de demonstração</b> (senha para todos: <b>barbearia123</b>):<br>
      Dono: <b>barbearia-vintage.dono</b> ou <b>barber-king.dono</b><br>
      Barbeiro: <b>carlos</b>, <b>rafael</b>, <b>diego</b>, <b>lucas</b> ou <b>bruno</b>
    </div>
  </div>

<script>
const form = document.getElementById("login-form");
const errorBox = document.getElementById("error-box");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorBox.style.display = "none";
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) {
      errorBox.textContent = data.error || "Não foi possível entrar.";
      errorBox.style.display = "block";
      return;
    }
    window.location.href = data.redirect;
  } catch (err) {
    errorBox.textContent = "Erro de conexão com o servidor.";
    errorBox.style.display = "block";
  }
});
</script>
</body>
</html>
